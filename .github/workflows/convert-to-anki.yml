name: Convert Practice Exams to Anki CSV

on:
  push:
    paths:
      - 'practice-exam/**'
    branches:
      - main
  pull_request:
    paths:
      - 'practice-exam/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install markdown beautifulsoup4

      - name: Run convert_to_anki script
        run: python convert_to_anki.py

      - name: Commit and push CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anki-csv/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto-update: regenerate Anki CSV files from practice exams"
            git push
          fi
